# Configuracion para pruebas (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# No cargar data.sql en tests
spring.sql.init.mode=never

# JWT para pruebas
app.jwt.secret=test-secret-key-for-unit-tests-with-sufficient-length-1234567890
app.jwt.expiration=86400000
jwt.secret=test-secret-key-for-unit-tests-with-sufficient-length-1234567890
jwt.expiration=86400000

logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.minero.logistica=WARN
