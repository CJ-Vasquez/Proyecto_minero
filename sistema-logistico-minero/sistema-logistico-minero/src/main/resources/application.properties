# Application name
spring.application.name=sistema-logistico-minero

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/minero_logistica
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initial data
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
jwt.secret=5c8a7d6f9e2b1a4c3d6e8f9a2b4c6d8e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:4200

# Server Configuration
server.port=8082

# Logging
logging.level.com.minero.logistica=DEBUG
logging.level.org.springframework.security=DEBUG

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB